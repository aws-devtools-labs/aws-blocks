name: Publish Packages

# Real npm release, automated on push to main. Manual/canary publishes live in
# publish-npm.yml and publish-canary.yml.

on:
  push:
    branches: [main]

concurrency:
  group: publish-packages
  cancel-in-progress: false

permissions:
  id-token: write # npm provenance
  contents: write

jobs:
  publish:
    name: Version & Publish (npm)
    runs-on: ubuntu-latest
    environment: publish
    env:
      NODE_OPTIONS: '--test-reporter=spec'
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.OPS_GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Run changeset version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx changeset version
          npm install --package-lock-only
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version bumps — skipping publish"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: E2E Test Local
        if: steps.version.outputs.changed == 'true'
        run: npm run test:e2e:local

      - name: Commit version bumps
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages [skip ci]"

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: npx changeset publish

      - name: Push version commit and tags
        if: steps.version.outputs.changed == 'true'
        run: |
          git pull --rebase origin main
          git push --follow-tags

      - name: Summary
        if: always()
        run: |
          echo "## Publish Packages" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.version.outputs.changed }}" != "true" ]; then
            echo "_No version bumps detected — nothing to publish._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "- **Mode:** LIVE publish to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Published tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          git tag --points-at HEAD | sed 's/^/- `/; s/$/`/' >> "$GITHUB_STEP_SUMMARY" || true
