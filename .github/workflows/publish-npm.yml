name: Publish to npm (manual)

# Manual npm publish from a chosen branch. Does not version; publishes ref
# versions not already on npm via `changeset publish`. Live publish requires
# dry_run=false and confirm="publish".

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (pack & validate only, nothing is published)
        type: boolean
        default: true
      confirm:
        description: Type "publish" to confirm a LIVE publish (ignored for dry runs)
        type: string
        default: ''

concurrency:
  group: publish-npm-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write # npm provenance
  contents: read

jobs:
  publish-npm:
    name: Publish to npm (${{ inputs.dry_run && 'dry-run' || 'LIVE' }})
    runs-on: ubuntu-latest
    environment: publish
    env:
      NODE_OPTIONS: '--test-reporter=spec'
      HUSKY: '0'
    steps:
      - name: Confirm live publish
        if: inputs.dry_run != true
        run: |
          if [ "${{ inputs.confirm }}" != "publish" ]; then
            echo "::error::Live publish requires confirm=\"publish\" (got \"${{ inputs.confirm }}\")."
            echo "Re-run with dry_run unchecked AND confirm set to: publish"
            exit 1
          fi
          echo "Live publish confirmed for branch '${{ github.ref_name }}'."

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspaces --access=public --dry-run
          else
            npx changeset publish
          fi

      - name: Summary
        if: always()
        run: |
          MODE="${{ inputs.dry_run == true && 'Dry run (nothing published)' || 'LIVE publish' }}"
          echo "## Publish to npm (manual)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Mode:** $MODE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
