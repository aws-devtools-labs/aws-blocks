name: Windows E2E

# Verifies the Windows-specific client tooling end to end, in one job that
# shares a single npm ci + build. The bug (#19) lives entirely in the tooling
# (process spawning, CDK synth, path handling, deploy/destroy orchestration);
# once deployed, app logic runs in Lambda on Linux and is OS-independent, so we
# do NOT re-run the behavioral test suites here — those stay on Linux. This job
# only confirms each environment's tooling works on Windows:
#
#   1. local dev — dev server boots and serves :3000 (no AWS)
#   2. sandbox   — deploy then destroy
#   3. production — deploy then destroy
#
# Fail-fast: a failure in one environment skips the later ones. Each destroy is
# best-effort cleanup (continue-on-error) and only runs if its deploy started;
# the scheduled cleanup-stacks workflow is the backstop for any leak.
#
# Standalone (not pr-checks.yml) and not wired into the required gate, so it is
# OPTIONAL for now — runs on every PR for visibility, does not block merges.

on:
  pull_request:
    branches: ['*']

concurrency:
  group: windows-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  windows-e2e:
    name: Windows E2E (dev + sandbox + production)
    runs-on: windows-latest
    timeout-minutes: 120
    # Skip for fork PRs — they don't get secrets/OIDC.
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: publish
    env:
      # Short, PR-unique suffix. The Windows runner username (`runneradmin`) is
      # longer than Linux's (`runner`), and FileBucket names derive from the
      # stack name — keep this short so the derived name stays under S3's
      # 63-char limit. Sandbox and production use different name prefixes, so a
      # single suffix is safe for both.
      BLOCKS_STACK_SUFFIX: w${{ github.event.pull_request.number }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # ── 1. Local dev (no AWS) ────────────────────────────────────────────
      - name: Local dev boot smoke
        run: node scripts/ci/windows-dev-smoke.mjs

      # ── 2. Sandbox (deploy + destroy only) ───────────────────────────────
      - name: Sandbox deploy
        id: sandbox_deploy
        working-directory: test-apps/comprehensive
        run: node --import tsx test/sandbox-deploy.ts aws-blocks/index.cdk.ts

      - name: Sandbox destroy
        if: always() && steps.sandbox_deploy.conclusion != 'skipped'
        continue-on-error: true
        working-directory: test-apps/comprehensive
        run: node --import tsx test/sandbox-destroy.ts aws-blocks/index.cdk.ts

      # ── 3. Production (deploy + destroy only) ────────────────────────────
      - name: Production deploy
        id: prod_deploy
        working-directory: test-apps/comprehensive
        run: node --import tsx test/production-deploy.ts aws-blocks/index.cdk.ts

      - name: Production destroy
        if: always() && steps.prod_deploy.conclusion != 'skipped'
        continue-on-error: true
        working-directory: test-apps/comprehensive
        run: node --import tsx test/production-destroy.ts aws-blocks/index.cdk.ts
