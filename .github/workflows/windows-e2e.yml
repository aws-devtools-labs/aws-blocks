name: Windows E2E

# Verifies the Windows client tooling against the LITERAL user commands.
#
# Packs this branch to a local registry, scaffolds a default-template app
# exactly as a customer would (`create-blocks-app`, installed packages with
# their own .cmd bin shims), then runs the real `npm run build` / `npm run dev`
# / `npm run sandbox` / `npm run deploy` (+ teardown). The bug (#19) lives in the
# client tooling — process spawning, CDK synth, path handling; deployed app
# logic runs in Lambda (Linux) and is OS-independent, so the behavioral test
# suites stay on Linux and are NOT re-run here.
#
# Fail-fast across phases; the driver always tears down anything it deployed and
# the scheduled cleanup-stacks workflow is the backstop for any leak.
#
# Standalone (not pr-checks.yml) and not in the required gate, so it is OPTIONAL
# for now — runs on every PR for visibility, does not block merges.

on:
  pull_request:
    branches: ['*']

concurrency:
  group: windows-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  windows-e2e:
    name: Windows E2E (build + dev + sandbox + deploy)
    runs-on: windows-latest
    timeout-minutes: 120
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: publish
    env:
      # Short, PR-unique stack suffix — the Windows runner username
      # (`runneradmin`) is longer than Linux's, and FileBucket names derive from
      # the stack name, so keep this short to stay under S3's 63-char limit.
      BLOCKS_STACK_SUFFIX: w${{ github.event.pull_request.number }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      # Pack this branch's packages to ./dist-registry so the scaffolded app
      # installs branch code in its real, published form.
      - name: Pack to local registry
        run: npm run publish:dry-run

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Scaffold + real npm run build / dev / sandbox / deploy (+ teardown).
      - name: Scaffold template and run user commands
        run: node scripts/ci/windows-template-e2e.mjs
