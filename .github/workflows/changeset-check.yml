name: Changeset Check
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: Require changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci

      - name: Detect breaking (minor) changesets
        env:
          COMMENT_BODY_FILE: ${{ runner.temp }}/breaking-comment.md
        run: npx tsx scripts/changeset-guard.ts report-breaking

      - name: Upsert breaking-change PR comment
        # Fork PRs get a read-only token and cannot comment.
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --edit-last updates the bot's existing comment; --create-if-none posts the first.
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file "${{ runner.temp }}/breaking-comment.md" \
            --edit-last --create-if-none

      - run: npx @changesets/cli status --since=origin/main
      - name: Verify changeset covers all changed packages
        run: npx tsx scripts/changeset-guard.ts verify-coverage
      - name: Block major version bumps (pre-release)
        run: npx tsx scripts/changeset-guard.ts block-major
