name: Lock Threads
on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@f1a42f0f44eb83361d617a014663e1a76cf282d2
        with:
          issue-lock-inactive-days: '365'
          issue-lock-reason: 'resolved'
